name: CI/CD Pipeline

on:
  push:
    branches: [main, local]
  pull_request:
    branches: [main, local]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/galonku-backend

jobs:
  # ──────────────────────────────────────
  # Job 1: Build & Lint (semua branch)
  # ──────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ──────────────────────────────────────
  # Job 2: Push Staging Image (local)
  # ──────────────────────────────────────
  push-staging:
    name: Push Staging Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/local' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build & Push Staging Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./DockerFile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:staging
            ${{ env.DOCKER_IMAGE }}:staging-${{ github.sha }}

  # ──────────────────────────────────────
  # Job 3: Push Production Image (main)
  # ──────────────────────────────────────
  push-production:
    name: Push Production Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build & Push Production Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./DockerFile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
